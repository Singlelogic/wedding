<svg width="732" height="462" viewBox="0 0 732 462" xmlns="http://www.w3.org/2000/svg">

    <!-- Заголовок с месяцем -->
    <text x="366" y="78" font-family="Cormorant Garamond, Georgia, serif" font-size="36" font-weight="600" fill="#45442B" text-anchor="middle">Июнь 2026</text>

    <!-- Линия под заголовком -->
    <line x1="112.5" y1="102" x2="619.5" y2="102" stroke="#e0e0e0" stroke-width="2.25"/>

    <!-- Дни недели -->
    <g font-family="Cormorant Garamond, Georgia, serif" font-size="18" font-weight="500" fill="#000000" text-anchor="middle">
        <text x="90" y="147">ПН</text>
        <text x="180" y="147">ВТ</text>
        <text x="270" y="147">СР</text>
        <text x="360" y="147">ЧТ</text>
        <text x="450" y="147">ПТ</text>
        <text x="540" y="147">СБ</text>
        <text x="630" y="147">ВС</text>
    </g>

    <!-- Разделительная линия между днями недели и числами -->
    <line x1="45" y1="163.5" x2="675" y2="163.5" stroke="#d0d0d0" stroke-width="2.25"/>

    <!-- Горизонтальные линии между рядами чисел -->
    <g stroke="#eaeaea" stroke-width="1.2">
        <line x1="45" y1="214.5" x2="675" y2="214.5"/>
        <line x1="45" y1="270" x2="675" y2="270"/>
        <line x1="45" y1="327" x2="675" y2="327"/>
        <line x1="45" y1="382.5" x2="675" y2="382.5"/>
    </g>

    <!-- Определение анимации для пульсирующего контура сердца -->
    <defs>
        <style>
            @keyframes pulse {
                0% {
                    opacity: 0.8;
                }
                50% {
                    opacity: 0.2;
                }
                100% {
                    opacity: 0.8;
                }
            }
            .pulse-heart {
                animation: pulse 2s ease-in-out infinite;
                transform-origin: center;
            }
        </style>
        <!-- Определение формы сердца для контура -->
        <symbol id="heart-outline" viewBox="0 0 100 100">
            <path d="M50,20 C40,5 20,5 10,20 C0,35 10,55 30,70 L50,85 L70,70 C90,55 100,35 90,20 C80,5 60,5 50,20"
                  fill="none"
                  stroke="currentColor"
                  stroke-width="2.5"/>
        </symbol>
    </defs>

    <!-- Числа месяца -->
    <g font-family="Cormorant Garamond, Georgia, serif" font-size="21" fill="#000000" text-anchor="middle">
        <!-- Неделя 1 -->
        <text x="90" y="193.5">1</text>
        <text x="180" y="193.5">2</text>
        <text x="270" y="193.5">3</text>
        <text x="360" y="193.5">4</text>
        <text x="450" y="193.5">5</text>

        <!-- Группа для числа 6 с пульсирующими прозрачными сердцами -->
        <g transform="translate(540, 193.5)">
            <!-- Пульсирующие прозрачные сердца-контуры -->
            <g fill="none" stroke="#b76e79" class="pulse-heart" opacity="0.7">
                <use href="#heart-outline" width="60" height="60" transform="translate(-30, -30)"/>
            </g>
            <g fill="none" stroke="#b76e79" class="pulse-heart" opacity="0.4" style="animation-delay: -0.7s">
                <use href="#heart-outline" width="78" height="78" transform="translate(-39, -39)"/>
            </g>
            <g fill="none" stroke="#b76e79" class="pulse-heart" opacity="0.2" style="animation-delay: -1.4s">
                <use href="#heart-outline" width="96" height="96" transform="translate(-48, -48)"/>
            </g>

            <!-- Число 6 -->
            <text x="0" y="0" fill="#b76e79" font-weight="600" font-size="24" text-anchor="middle" dominant-baseline="middle">6</text>
        </g>

        <text x="630" y="193.5">7</text>

        <!-- Неделя 2 -->
        <text x="90" y="250.5">8</text>
        <text x="180" y="250.5">9</text>
        <text x="270" y="250.5">10</text>
        <text x="360" y="250.5">11</text>
        <text x="450" y="250.5">12</text>
        <text x="540" y="250.5">13</text>
        <text x="630" y="250.5">14</text>

        <!-- Неделя 3 -->
        <text x="90" y="307.5">15</text>
        <text x="180" y="307.5">16</text>
        <text x="270" y="307.5">17</text>
        <text x="360" y="307.5">18</text>
        <text x="450" y="307.5">19</text>
        <text x="540" y="307.5">20</text>
        <text x="630" y="307.5">21</text>

        <!-- Неделя 4 -->
        <text x="90" y="364.5">22</text>
        <text x="180" y="364.5">23</text>
        <text x="270" y="364.5">24</text>
        <text x="360" y="364.5">25</text>
        <text x="450" y="364.5">26</text>
        <text x="540" y="364.5">27</text>
        <text x="630" y="364.5">28</text>

        <!-- Неделя 5 -->
        <text x="90" y="421.5">29</text>
        <text x="180" y="421.5">30</text>
    </g>
</svg>